name: Python Testing & Render Deployment
on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with pytest
      run: |
        pytest test_app.py

  deploy-api:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Trigger Render deploy hook for api
      env:
        RENDER_DEPLOY_HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
      run: |
        curl -fsSL "$RENDER_DEPLOY_HOOK_API"

  deploy-ui:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Trigger Render deploy hook for UI
      env:
        RENDER_DEPLOY_HOOK_UI: ${{ secrets.RENDER_DEPLOY_HOOK_UI }}
      run: |
        curl -fsSL "$RENDER_DEPLOY_HOOK_UI"
