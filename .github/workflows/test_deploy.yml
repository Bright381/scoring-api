name: Python Testing & Google Cloud Deployement
on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with pytest
      run: |
        pytest test_app.py

  deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
          contents: 'read'
          id-token: 'write'
    
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: project-9f6840f4-e944-44b8-895 
          workload_identity_provider: projects/23678029784/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          # Email address or unique identifier of the Google Cloud service account for
      # which to generate credentials. This is required if
      # "workload_identity_provider" is specified.
          service_account: github-deployer-383@project-9f6840f4-e944-44b8-895.iam.gserviceaccount.com     
                
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: scoring-api
          region: europe-west9
          source: ./